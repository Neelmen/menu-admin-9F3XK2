<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Admin Menu</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <h1>Administration Menu</h1>

    <!-- LOGIN ADMIN -->

    <div id="login-section">

        <h2>Connexion Admin</h2>

        <input type="email" id="admin-email" placeholder="Email" required>

        <input type="password" id="admin-password" placeholder="Mot de passe" required>

        <button type="button" onclick="loginAdmin()">Se connecter</button>

        <p id="login-message"></p>

    </div>

    <!-- PANEL ADMIN -->

    <div id="admin-panel" style="display:none;">

        <button type="button" onclick="logoutAdmin()">Se déconnecter</button>

        <hr class="admin-separator">

        <h2>Ajouter / Modifier un plat</h2>

        <form id="dish-form">

            <input type="text" id="name" name="name" placeholder="Nom du plat" required>

            <select id="category" name="category">
                <option value="entree">Entrées</option>
                <option value="plat">Plats</option>
                <option value="dessert">Desserts</option>
                <option value="boisson">Boissons</option>
            </select>

            <label for="subcategory">Sous-catégorie :</label>
            <input list="subcategory-list" name="subcategory" id="subcategory">
            <datalist id="subcategory-list"></datalist>

            <label class="file-upload">
                Choisir une image
                <input type="file" id="image_file" name="image_file">
            </label>
            <div id="image-preview"></div>

            <input type="number" id="price" name="price" placeholder="Prix" step="0.01" required>

            <textarea id="description" name="description" placeholder="Description"></textarea>

            <textarea id="ingredients" name="ingredients" placeholder="Ingrédients"></textarea>

            Afficher au menu
            <label class="switch">
                <input type="checkbox" id="available" name="available" checked>
                <span class="slider"></span>
            </label>

            <button type="submit">Ajouter</button>

        </form>

        <h2>Liste des plats</h2>

        <div id="dish-list"></div>

    </div>

    <!-- JS COMPLET -->
    <script src="app.js"></script>

    <!-- preview image -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const imageInput = document.getElementById("image_file");
            const preview = document.getElementById("image-preview");

            imageInput.addEventListener("change", () => {
                const file = imageInput.files[0];

                if (file) {
                    const url = URL.createObjectURL(file);
                    preview.innerHTML =
                        `<img src="${url}" style="max-width:200px;border-radius:10px;margin-top:10px;">`;
                } else {
                    preview.innerHTML = "";
                }
            });
        });
    </script>

</body>
</html>

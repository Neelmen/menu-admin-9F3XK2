<form id="dish-form">

    <input type="text" id="name" name="name" placeholder="Nom du plat" required>

    <select id="category" name="category">
        <option value="entree">Entrée</option>
        <option value="plat">Plat</option>
        <option value="dessert">Dessert</option>
        <option value="boisson">Boisson</option>
    </select>

    <input type="text" id="subcategory" name="subcategory" placeholder="Sous catégorie">

    <label class="file-upload">
        Choisir une image
        <input type="file" id="image_file" name="image_file">
    </label>

    <input type="number" id="price" name="price" placeholder="Prix" step="0.01" required>

    <textarea id="description" name="description" placeholder="Description"></textarea>

    <textarea id="ingredients" name="ingredients" placeholder="Ingrédients"></textarea>

    Disponible
    <label class="switch">
        <input type="checkbox" id="available" name="available" checked>
        <span class="slider"></span>
    </label>

    <button type="submit">Ajouter</button>

</form>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Menu</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>
<img src="https://oaxpofkmtrudriyrbxvy.supabase.co/storage/v1/object/public/dishes-images/1773362992581.webp">
<h1>Administration Menu</h1>

<!-- LOGIN ADMIN -->

<div id="login-section">

<h2>Connexion Admin</h2>

<input type="email" id="admin-email" placeholder="Email" required>

<input type="password" id="admin-password" placeholder="Mot de passe" required>

<button type="button" onclick="loginAdmin()">Se connecter</button>

<p id="login-message"></p>

</div>


<!-- PANEL ADMIN -->

<div id="admin-panel" style="display:none;">

<button type="button" onclick="logoutAdmin()">Se déconnecter</button>

<h2>Ajouter un plat</h2>

<form id="dish-form">

<input type="text" id="name" placeholder="Nom du plat" required>

<select id="category">
<option value="entree">Entrée</option>
<option value="plat">Plat</option>
<option value="dessert">Dessert</option>
<option value="boisson">Boisson</option>
</select>

<input type="text" id="subcategory" placeholder="Sous catégorie">

<input type="file" id="image_file" accept="image/*">

<input type="number" id="price" placeholder="Prix" step="0.01" required>

<textarea id="description" placeholder="Description"></textarea>

<textarea id="ingredients" placeholder="Ingrédients"></textarea>

<label>
Disponible
<input type="checkbox" id="available" checked>
</label>

<button type="submit">Ajouter</button>

</form>

<div id="image-preview"></div>

<h2>Liste des plats</h2>

<div id="dish-list"></div>

</div>


<script src="app.js"></script>


<script>

document.addEventListener("DOMContentLoaded", () => {

const imageInput = document.getElementById("image_url");
const preview = document.getElementById("image-preview");

imageInput.addEventListener("input", () => {

const url = imageInput.value.trim();

if(url){

preview.innerHTML = `<img src="${url}" style="max-width:200px">`;

}else{

preview.innerHTML = "";

}

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Menu</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>Administration Menu</h1>

<h2>Ajouter un plat</h2>

<form id="dish-form">

<input type="text" id="name" placeholder="Nom du plat" required>

<select id="category">
<option value="entree">Entrée</option>
<option value="plat">Plat</option>
<option value="dessert">Dessert</option>
<option value="boisson">Boisson</option>
</select>

<input type="text" id="subcategory" placeholder="Sous catégorie">

<input type="text" id="image_url" placeholder="Coller le lien de l'image ici">

<input type="number" id="price" placeholder="Prix">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="ingredients" placeholder="Ingrédients"></textarea>

<input type="file" id="image">

<label>
Disponible
<input type="checkbox" id="available" checked>
</label>

<button type="submit">Ajouter</button>

</form>

<h2>Liste des plats</h2>

<div id="dish-list"></div>

<script src="app.js"></script>

</body>

</html>
